name: Ejecutar y actualizar bat diariamente

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-and-update-bat:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:

    - name: Checkout del repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar credenciales de Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Ejecutar abrir_dashboard.bat
      run: cmd /c abrir_dashboard.bat

    - name: Guardar cambios y subir a GitHub
      run: |
        git add .

        git diff --cached --quiet && echo "Sin cambios para commit" && exit /b 0

        git commit -m "Actualización diaria automática del .bat"

        git push origin main
